services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./services/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true

  backtester:
    build:
      context: ./services/backtester
      dockerfile: Dockerfile
    restart: "no"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      FRED_API_KEY: ${FRED_API_KEY}
      NIM_API_KEY: ${NIM_API_KEY}
      NIM_BASE_URL: https://integrate.api.nvidia.com/v1
      NIM_MODEL: ${NIM_MODEL}
      HOME: /tmp
      XDG_CACHE_HOME: /tmp
      SCORER_PY_PATH: /scorer/scorer.py
    volumes:
      - ./services/grading/app:/scorer:rw
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - egress
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
          pids: 100

networks:
  internal:
    driver: bridge
  egress:
    driver: bridge

volumes:
  postgres-data:
